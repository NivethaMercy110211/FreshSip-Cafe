<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Login to your FreshSip Cafe account – Access your order history, saved combos, and loyalty rewards." />
  <title>Login – FreshSip Cafe</title>
  <link rel="icon" type="image/svg+xml" href="images/favicon.svg" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body class="auth-body auth-login-bg">

<!-- TOP CONTROLS -->
<div class="auth-top-controls">
  <button class="auth-ctrl-btn btn-theme-toggle" data-toggle-theme title="Toggle Theme">
    <i class="bi bi-moon-fill" data-theme-icon data-icon-dark="bi bi-sun-fill" data-icon-light="bi bi-moon-fill"></i>
  </button>
  <button class="auth-ctrl-btn btn-rtl-toggle" data-toggle-rtl title="Toggle RTL/LTR">
    <span data-rtl-label style="font-weight: 700; font-size: 0.72rem; letter-spacing: 0.5px;">RTL</span>
  </button>
</div>

<div class="auth-centered-wrapper">
  <div class="auth-single-card">

    <!-- LOGO -->
    <a href="index.html" class="auth-single-logo">
      <div class="auth-logo-icon"><i class="ri-leaf-fill"></i></div>
      <div>
        <span class="brand-name">FreshSip</span>
        <span class="brand-tagline">Juice Bar &amp; Cafe</span>
      </div>
    </a>

    <div class="auth-form-header text-center">
      <h1 class="auth-form-title">Sign In</h1>
    </div>

    <form class="form-custom" data-demo id="loginForm">
      <div class="form-group-auth">
        <label class="form-label" for="login-email">Email Address</label>
        <div class="input-icon-wrap">
          <i class="ri-mail-line input-icon"></i>
          <input type="email" id="login-email" class="form-control auth-input" placeholder="your@email.com" required />
        </div>
      </div>
      <div class="form-group-auth">
        <label class="form-label d-flex justify-content-between" for="login-password">
          Password <a href="forgot-password.html" class="auth-forgot-link">Forgot password?</a>
        </label>
        <div class="input-icon-wrap">
          <i class="ri-lock-line input-icon"></i>
          <input type="password" id="login-password" class="form-control auth-input" placeholder="Your password" required />
          <button type="button" class="btn-password-toggle" data-toggle-password="login-password" aria-label="Toggle password visibility">
            <i class="bi bi-eye-slash"></i>
          </button>
        </div>
      </div>
      <div class="d-flex align-items-center justify-content-between mb-4">
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="remember-me" />
          <label class="form-check-label" for="remember-me" style="font-size:0.875rem;color:var(--auth-text-muted);">Remember me for 30 days</label>
        </div>
      </div>
      <button type="submit" class="btn-auth-primary" id="loginBtn">
        <i class="ri-login-box-line"></i> Sign In to My Account
      </button>
    </form>

    <!-- DIVIDER -->
    <div class="auth-divider"><span>or continue with</span></div>

    <!-- SOCIAL BUTTONS -->
    <div class="auth-social-buttons">
      <button class="btn-social-auth btn-google" type="button" aria-label="Login with Google">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>
      <button class="btn-social-auth btn-facebook" type="button" aria-label="Login with Facebook">
        <i class="fab fa-facebook-f" style="font-size:1rem;"></i>
        Continue with Facebook
      </button>
      <button class="btn-social-auth btn-apple" type="button" aria-label="Login with Apple">
        <i class="fab fa-apple" style="font-size:1.1rem;"></i>
        Continue with Apple
      </button>
    </div>

    <p class="auth-switch-link">Need an account? <a href="signup.html">Create one free</a></p>

    <div class="auth-footer-note">
      By signing in, you agree to our <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/main.js"></script>
</body>
</html>
